openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user management
  - name: tenants
    description: Tenant management
  - name: admin
    description: Super-admin platform operations
  - name: onboarding
    description: Self-serve tenant onboarding for new sign-ups
  - name: master-data
    description: Master data management — items, suppliers, customers, warehouses, GL accounts
  - name: Sales
    description: Sales module — quotations, sales orders, despatch, invoicing, credit notes, RMA
  - name: Inventory
    description: Inventory management — stock levels, movements, adjustments, transfers, stocktake, cycle counts, lot traceability
  - name: Storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      description: Returns the authenticated user's profile, tenant, and role
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCurrentUser
      tags: [auth]
      summary: Update current user profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current:
    get:
      operationId: getCurrentTenant
      tags: [tenants]
      summary: Get current tenant
      description: Returns the current tenant's info for the authenticated user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No tenant found for user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current/members:
    get:
      operationId: getTenantMembers
      tags: [tenants]
      summary: List tenant members
      description: |
        Returns all members of the current tenant — both active members and
        pending invitations. Pending rows have `status: pending` and a
        `clerkId` that begins with `pending:`. Tenant-admin only.
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Tenant members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantMember"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current/members/{membershipId}:
    patch:
      operationId: updateTenantMember
      tags: [tenants]
      summary: Update a tenant member's role or active status
      description: |
        Tenant-admin only. Cannot set role to super_admin, modify a super_admin,
        modify your own membership, or demote/deactivate the last active
        tenant_admin.
      security:
        - clerkAuth: []
      parameters:
        - name: membershipId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantMemberBody"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMember"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current/invites:
    post:
      operationId: createTenantInvite
      tags: [tenants]
      summary: Invite a new member to the current tenant
      description: |
        Creates a pending membership row (clerkId = `pending:<email>`,
        isActive=false) and dispatches a Clerk invitation email.
        Tenant-admin only.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInviteBody"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantInviteResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Member or pending invite already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current/invites/{membershipId}/resend:
    post:
      operationId: resendTenantInvite
      tags: [tenants]
      summary: Resend a pending tenant invitation
      description: Tenant-admin only. Re-dispatches the Clerk invitation email for a pending membership.
      security:
        - clerkAuth: []
      parameters:
        - name: membershipId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invite resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantInviteResult"
        "400":
          description: Membership is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current/invites/{membershipId}:
    delete:
      operationId: revokeTenantInvite
      tags: [tenants]
      summary: Revoke a pending tenant invitation
      description: |
        Tenant-admin only. Deletes the pending membership row and revokes any
        pending Clerk invitations for that email.
      security:
        - clerkAuth: []
      parameters:
        - name: membershipId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Invite revoked
        "400":
          description: Membership is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/onboard:
    post:
      operationId: onboardTenant
      tags: [tenants]
      summary: Self-serve tenant onboarding
      description: >
        Creates a new tenant for the authenticated user, assigns them as
        tenant_admin, and (for paid plans) creates a Stripe Checkout Session
        whose URL the client should redirect the user to. For the "starter"
        plan, the response asks the client to send the user to /dashboard.
        Idempotent: if the user already has an active tenant membership,
        returns the existing tenant unchanged.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardTenantInput"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardTenantResult"
        "200":
          description: User already had a tenant; returns existing one
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardTenantResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Slug already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/kpi:
    get:
      operationId: getAdminKpi
      tags: [admin]
      summary: Get platform KPI metrics
      description: Returns platform-wide KPI metrics for the super-admin dashboard
      security:
        - clerkAuth: []
      responses:
        "200":
          description: KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKpi"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants:
    get:
      operationId: listAdminTenants
      tags: [admin]
      summary: List all tenants
      description: Returns all non-deleted tenants with member counts and Stripe info
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTenant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAdminTenant
      tags: [admin]
      summary: Create a new tenant
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantBody"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantCreated"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}:
    get:
      operationId: getAdminTenant
      tags: [admin]
      summary: Get tenant details
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminTenant
      tags: [admin]
      summary: Update tenant
      description: Update tenant status, plan, or other settings
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantCreated"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAdminTenant
      tags: [admin]
      summary: Soft-delete tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/stripe-sync:
    post:
      operationId: syncTenantStripe
      tags: [admin]
      summary: Create or sync Stripe customer for tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stripe customer synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSyncResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/stripe-subscription:
    post:
      operationId: createTenantSubscription
      tags: [admin]
      summary: Create or update Stripe subscription for tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionBody"
      responses:
        "200":
          description: Stripe subscription created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/invoices:
    get:
      operationId: getTenantInvoices
      tags: [admin]
      summary: Get tenant Stripe invoices
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/create-tenant:
    post:
      operationId: createOnboardingTenant
      tags: [onboarding]
      summary: Create a tenant via the self-serve onboarding wizard
      description: >
        Creates a new tenant for the authenticated user, makes them the
        tenant_admin, marks onboarding complete, and optionally records
        invitations for additional teammates. If the user already has an
        active membership, returns the existing tenant unchanged.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingTenantInput"
      responses:
        "201":
          description: Tenant created and onboarding completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "200":
          description: User already had a tenant; returns existing one
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/session:
    get:
      operationId: getOnboardingSession
      tags: [onboarding]
      summary: Get the current user's onboarding session progress
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Session progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSession"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateOnboardingSession
      tags: [onboarding]
      summary: Save or update the current user's onboarding session progress
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingSessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSession"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/validate-abn:
    post:
      operationId: validateTaxId
      tags: [onboarding]
      summary: Validate a tax ID / ABN format
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateTaxIdInput"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateTaxIdResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/upload-csv:
    post:
      operationId: uploadOnboardingCsv
      tags: [onboarding]
      summary: Upload and parse a CSV file for master data import
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                csvType:
                  type: string
                  enum: [items, suppliers, customers]
      responses:
        "200":
          description: Parsed CSV rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvUploadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/load-sample:
    post:
      operationId: loadSampleData
      tags: [onboarding]
      summary: Load built-in sample data for master data import
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Sample data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SampleDataResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/setup-payment:
    post:
      operationId: setupPaymentIntent
      tags: [onboarding]
      summary: Create a Stripe SetupIntent for collecting payment details
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Stripe client secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupPaymentResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/complete:
    post:
      operationId: completeOnboarding
      tags: [onboarding]
      summary: Complete onboarding — creates tenant, warehouses, departments, imports master data, sends invites
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOnboardingInput"
      responses:
        "201":
          description: Onboarding complete, tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "200":
          description: User already had a tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/members:
    get:
      operationId: listAdminTenantMembers
      tags: [admin]
      summary: List members of a tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tenant members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTenantMember"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: inviteAdminTenantMember
      tags: [admin]
      summary: Invite a new member to a tenant
      description: >
        Creates a Clerk invitation for the given email and a pending
        tenant_membership row. When the invitee accepts the invite and signs
        in, their Clerk id is bound to the existing membership and it is
        activated. Writes an audit log entry.
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberBody"
      responses:
        "201":
          description: Invitation created and pending membership inserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteMemberResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A membership already exists for that email in this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Clerk invitation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

