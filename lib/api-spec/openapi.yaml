        - { name: days, in: query, schema: { type: integer } }
        - { name: warehouseId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /inventory/reports/stocktake-variance/export/csv:
    get:
      operationId: exportStocktakeVarianceCsv
      tags: [Inventory]
      summary: Export stocktake variance as CSV
      security: [{ clerkAuth: [] }]
      parameters:
        - { name: x-tenant-id, in: header, required: true, schema: { type: string } }
        - { name: stocktakeRunId, in: query, schema: { type: integer } }
        - { name: warehouseId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string }

  /inventory/reports/stocktake-variance/export/pdf:
    get:
      operationId: exportStocktakeVariancePdf
      tags: [Inventory]
      summary: Export stocktake variance as PDF
      security: [{ clerkAuth: [] }]
      parameters:
        - { name: x-tenant-id, in: header, required: true, schema: { type: string } }
        - { name: stocktakeRunId, in: query, schema: { type: integer } }
        - { name: warehouseId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /inventory/reports/movement-history:
    get:
      tags: [Inventory]
      summary: Inventory movement history
      security: [{ clerkAuth: [] }]
      parameters:
        - { name: x-tenant-id, in: header, required: true, schema: { type: string } }
        - { name: fromDate, in: query, schema: { type: string } }
        - { name: toDate, in: query, schema: { type: string } }
        - { name: warehouseId, in: query, schema: { type: integer } }
        - { name: itemId, in: query, schema: { type: integer } }
        - { name: movementType, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Paginated movement history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: object, additionalProperties: true }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
                  pages: { type: integer }

  /inventory/reports/slow-moving:
    get:
      tags: [Inventory]
      summary: Slow-moving items report
      security: [{ clerkAuth: [] }]
      parameters:
        - { name: x-tenant-id, in: header, required: true, schema: { type: string } }
        - { name: days, in: query, schema: { type: integer } }
        - { name: warehouseId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Slow-moving items
          content:
            application/json:
              schema:
                type: object
                properties:
                  cutoffDays: { type: integer }
                  cutoffDate: { type: string }
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        itemId: { type: integer }
                        itemCode: { type: string }
                        itemName: { type: string }
                        warehouseId: { type: integer }
                        warehouseName: { type: string }
                        qtyOnHand: { type: number }
                        totalValue: { type: number }
                        lastMovementAt: { type: string, nullable: true }
                        daysSinceMovement: { type: number }

  /inventory/reports/stocktake-variance:
    get:
      tags: [Inventory]
      summary: Stocktake variance report
      security: [{ clerkAuth: [] }]
      parameters:
        - { name: x-tenant-id, in: header, required: true, schema: { type: string } }
        - { name: stocktakeRunId, in: query, schema: { type: integer } }
        - { name: warehouseId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Stocktake variance
          content:
            application/json:
              schema:
                type: object
                properties:
                  stocktakeRunId: { type: integer, nullable: true }
                  totalVarianceValue: { type: number }
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        runId: { type: integer }
                        runCode: { type: string }
                        itemCode: { type: string }
                        itemName: { type: string }
                        qtyExpected: { type: number }
                        qtyActual: { type: number }
                        variance: { type: number }
                        varianceValue: { type: number }

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CurrentUser:
      type: object
      properties:
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        tenantId:
          type: ["integer", "null"]
        tenantName:
          type: ["string", "null"]
        onboardingCompleted:
          type: boolean
      required:
        - clerkId
        - email
        - onboardingCompleted

    UpdateUserBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        currency:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        fiscalYearStart:
          type: ["integer", "null"]
        industryType:
          type: ["string", "null"]
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt

    TenantMember:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: string
          enum:
            - super_admin
            - tenant_admin
            - purchaser
            - warehouse
            - approver
            - accountant
            - viewer
        isActive:
          type: boolean
        status:
          type: string
          enum: [active, pending, inactive]
        joinedAt:
          type: string
      required:
        - id
        - clerkId
        - email
        - role
        - isActive
        - status
        - joinedAt

    CreateTenantInviteBody:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tenant_admin, purchaser, warehouse, approver, accountant, viewer]
      required:
        - email
        - role

    TenantInviteResult:
      type: object
      description: Outcome of dispatching (or resending) a tenant invitation.
      properties:
        id:
          type: integer
          description: Membership row id (use for resend / revoke)
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tenant_admin, purchaser, warehouse, approver, accountant, viewer]
        delivered:
          type: boolean
        clerkInvitationId:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
          description: Failure reason when delivered is false.
      required:
        - id
        - email
        - role
        - delivered

    UpdateTenantMemberBody:
      type: object
      properties:
        role:
          type: string
          enum: [tenant_admin, purchaser, warehouse, approver, accountant, viewer]
        isActive:
          type: boolean

    AdminKpi:
      type: object
      properties:
        totalTenants:
          type: integer
        activeTenants:
          type: integer
        trialTenants:
          type: integer
        suspendedTenants:
          type: integer
        stripeConnectedTenants:
          type: integer
        stripeConfigured:
          type: boolean
        estimatedMrrCents:
          type: integer
          description: Monthly recurring revenue in cents (plan-tier estimate for active/trial tenants)
        mrrIsEstimate:
          type: boolean
          description: True when MRR is a local plan-tier estimate rather than live Stripe data
      required:
        - totalTenants
        - activeTenants
        - trialTenants
        - suspendedTenants
        - stripeConnectedTenants
        - stripeConfigured
        - estimatedMrrCents
        - mrrIsEstimate

    AdminTenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        currency:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        memberCount:
          type: integer
        storageUsageMb:
          type: integer
          description: Storage used by this tenant in megabytes (estimated from data activity)
        subscriptionStatus:
          type: ["string", "null"]
          description: Stripe subscription status (active, trialing, past_due, canceled, etc.) or null if no subscription
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt
        - memberCount
        - storageUsageMb

    AdminTenantDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tradingName:
          type: ["string", "null"]
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        legalName:
          type: ["string", "null"]
        taxId:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        addressLine1:
          type: ["string", "null"]
        addressLine2:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        postalCode:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        fiscalYearStart:
          type: ["integer", "null"]
        industryType:
          type: ["string", "null"]
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        subscriptionStatus:
          type: ["string", "null"]
          description: Live Stripe subscription status (active, trialing, past_due, canceled, etc.)
        currentPeriodEnd:
          type: ["string", "null"]
          description: ISO timestamp of current billing period end from Stripe
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        memberCount:
          type: integer
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt
        - updatedAt
        - memberCount

    AdminTenantCreated:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        email:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        billingSyncStatus:
          type: ["string", "null"]
          enum: [ok, skipped, failed, null]
          description: |
            On plan-tier changes only: outcome of the Stripe subscription sync.
            "ok" = subscription updated/created. "skipped" = no Stripe customer
            or no price configured. "failed" = Stripe API call threw — DB plan
            persisted but billing diverged; reconcile manually.
        billingSyncReason:
          type: ["string", "null"]
          description: Human-readable explanation when billingSyncStatus is "skipped" or "failed".
      required:
        - id
        - name
        - slug
        - status
        - planTier

    CreateTenantBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        status:
          type: string
          enum: [active, suspended, trial, pending]
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        slug:
          type: string
      required:
        - name

    UpdateTenantBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        email:
          type: string
          format: email
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        industryType:
          type: string

    AdminTenantMember:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: string
          enum:
            - super_admin
            - tenant_admin
            - purchaser
            - warehouse
            - approver
            - accountant
            - viewer
        isActive:
          type: boolean
        joinedAt:
          type: string
      required:
        - id
        - clerkId
        - email
        - role
        - isActive
        - joinedAt

    UpdateMemberBody:
      type: object
      properties:
        role:
          type: string
          enum:
            - super_admin
            - tenant_admin
            - purchaser
            - warehouse
            - approver
            - accountant
            - viewer
        isActive:
          type: boolean

    InviteMemberBody:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - tenant_admin
            - purchaser
            - warehouse
            - approver
            - accountant
            - viewer
      required:
        - email
        - role

    InviteMemberResult:
      type: object
      properties:
        membership:
          $ref: "#/components/schemas/AdminTenantMember"
        invitationDelivered:
          type: boolean
          description: True if Clerk accepted and queued the invitation email
        clerkInvitationId:
          type: ["string", "null"]
        deliveryReason:
          type: ["string", "null"]
          description: When invitationDelivered is false, the reason from Clerk
      required:
        - membership
        - invitationDelivered

    StripeSyncResult:
      type: object
      properties:
        stripeCustomerId:
          type: string
      required:
        - stripeCustomerId

    CreateSubscriptionBody:
      type: object
      properties:
        planTier:
          type: string
          enum: [starter, growth, enterprise]

    SubscriptionResult:
      type: object
      properties:
        subscriptionId:
          type: string
        status:
          type: string
        planTier:
          type: string
        currentPeriodEnd:
          type: ["string", "null"]
        created:
          type: boolean
          description: True if a new subscription was created, false if existing was updated
      required:
        - subscriptionId
        - status
        - planTier
        - created

    InvoiceList:
      type: object
      properties:
        stripeConfigured:
          type: boolean
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
      required:
        - stripeConfigured
        - invoices

    Invoice:
      type: object
      properties:
        id:
          type: string
        number:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        amountDue:
          type: integer
        amountPaid:
          type: integer
        currency:
          type: string
        created:
          type: string
        hostedInvoiceUrl:
          type: ["string", "null"]
      required:
        - id
        - amountDue
        - amountPaid
        - currency
        - created

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: ["integer", "null"]
        actorClerkId:
          type: ["string", "null"]
        actorEmail:
          type: ["string", "null"]
        action:
          type: string
        entityType:
          type: ["string", "null"]
        entityId:
          type: ["string", "null"]
        oldValues:
          nullable: true
        newValues:
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - action
        - createdAt

    TrendPoint:
      type: object
      properties:
        weekStart:
          type: string
          description: ISO date for the start of the week bucket (Monday, UTC)
        value:
          type: number
      required:
        - weekStart
        - value

    AdminTrends:
      type: object
      properties:
        weeks:
          type: integer
          description: Number of weekly buckets returned
        signupsPerWeek:
          type: array
          description: Tenant signups per week derived from tenants.createdAt
          items:
            $ref: "#/components/schemas/TrendPoint"
        activeTenantsOverTime:
          type: array
          description: Cumulative count of non-suspended tenants at the end of each week
          items:
            $ref: "#/components/schemas/TrendPoint"
        mrrCentsOverTime:
          type: array
          description: Estimated MRR in cents at the end of each week
          items:
            $ref: "#/components/schemas/TrendPoint"
        mrrIsEstimate:
          type: boolean
          description: True when MRR is a plan-tier estimate rather than live Stripe data
      required:
        - weeks
        - signupsPerWeek
        - activeTenantsOverTime
        - mrrCentsOverTime
        - mrrIsEstimate

    TenantActivityPoint:
      type: object
      properties:
        date:
          type: string
          description: ISO date (YYYY-MM-DD) for the day bucket (UTC)
        count:
          type: integer
      required:
        - date
        - count

    TenantActivity:
      type: object
      properties:
        days:
          type: integer
          description: Number of daily buckets returned
        activity:
          type: array
          items:
            $ref: "#/components/schemas/TenantActivityPoint"
        totalEvents:
          type: integer
          description: Total audit-log events in the window
      required:
        - days
        - activity
        - totalEvents

    OnboardingInvite:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tenant_admin, purchaser, warehouse, approver, accountant, viewer]
      required:
        - email
        - role

    OnboardTenantInput:
      type: object
      description: Payload for the self-serve /tenants/onboard endpoint.
      required:
        - companyName
        - planTier
        - billingEmail
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 200
          description: The display name of the tenant / company.
        slug:
          type: string
          minLength: 2
          maxLength: 60
          pattern: "^[a-z0-9-]+$"
          description: Optional URL-safe slug. If omitted, derived from companyName.
        planTier:
          type: string
          enum: [starter, growth, enterprise]
          description: Subscription plan to activate. "starter" is free; paid plans require Stripe checkout.
        billingEmail:
          type: string
          format: email
          description: Email used for invoices and Stripe customer record.

    OnboardTenantResult:
      type: object
      required:
        - tenantId
        - slug
        - name
        - planTier
        - status
        - role
        - redirectTo
        - alreadyOnboarded
      properties:
        tenantId:
          type: integer
        slug:
          type: string
        name:
          type: string
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        status:
          type: string
          enum: [active, suspended, trial, pending]
        role:
          type: string
        redirectTo:
          type: string
          description: >
            Where the client should send the user next. Either an absolute Stripe Checkout URL
            (for paid plans when Stripe is configured) or the relative path "/dashboard".
        checkoutUrl:
          type: ["string", "null"]
          description: Stripe Checkout Session URL (only set for paid plans when Stripe is configured).
        checkoutSessionId:
          type: ["string", "null"]
          description: Stripe Checkout Session id, when one was created.
        alreadyOnboarded:
          type: boolean
          description: True when the user already had a tenant; no new tenant was created.

    OnboardingTenantInput:
      type: object
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 200
        industryType:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        invites:
          type: array
          maxItems: 25
          items:
            $ref: "#/components/schemas/OnboardingInvite"
      required:
        - companyName

    OnboardingInviteResult:
      type: object
      description: Per-invite dispatch outcome from the onboarding wizard.
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tenant_admin, purchaser, warehouse, approver, accountant, viewer]
        delivered:
          type: boolean
          description: True if the email was successfully handed off to Clerk's invitation API.
        reason:
          type: string
          description: Failure reason when delivered is false.
        clerkInvitationId:
          type: string
          description: Clerk invitation id, if delivery succeeded.
      required:
        - email
        - role
        - delivered

    OnboardingResult:
      type: object
      properties:
        tenantId:
          type: integer
        slug:
          type: string
        name:
          type: string
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        status:
          type: string
          enum: [active, suspended, trial, pending]
        role:
          type: string
        onboardingCompletedAt:
          type: string
        invitesSent:
          type: integer
          description: Number of invitations successfully dispatched via Clerk
        invitesAttempted:
          type: integer
          description: Number of invitations attempted (may differ from invitesSent on partial failure)
        invites:
          type: array
          description: Per-invite dispatch results
          items:
            $ref: "#/components/schemas/OnboardingInviteResult"
        alreadyOnboarded:
          type: boolean
          description: True when the user already had a tenant; no new tenant was created
      required:
        - tenantId
        - slug
        - name
        - planTier
        - status
        - role
        - invitesSent
        - alreadyOnboarded

    OnboardingSession:
      type: object
      properties:
        currentStep:
          type: integer
          minimum: 1
          maximum: 5
        data:
          type: object
          additionalProperties: true
        completedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - currentStep
        - data

    OnboardingSessionUpdate:
      type: object
      properties:
        currentStep:
          type: integer
          minimum: 1
          maximum: 5
        data:
          type: object
          additionalProperties: true

    ValidateTaxIdInput:
      type: object
      properties:
        taxId:
          type: string
        country:
          type: string
      required:
        - taxId

    ValidateTaxIdResult:
      type: object
      properties:
        valid:
          type: boolean
        message:
          type: string
        taxId:
          type: string
      required:
        - valid
        - message
        - taxId

    CsvUploadResult:
      type: object
      properties:
        csvType:
          type: string
          enum: [items, suppliers, customers]
        rows:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
        rowCount:
          type: integer
        errors:
          type: array
          items:
            type: string
        hasErrors:
          type: boolean
      required:
        - csvType
        - rows
        - rowCount
        - errors
        - hasErrors

    SampleDataItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        unitOfMeasure:
          type: string
        unitCost:
          type: string
        category:
          type: string
      required:
        - code
        - name

    SampleDataSupplier:
      type: object
      properties:
