openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user management
  - name: tenants
    description: Tenant management
  - name: admin
    description: Super-admin platform operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      description: Returns the authenticated user's profile, tenant, and role
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCurrentUser
      tags: [auth]
      summary: Update current user profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current:
    get:
      operationId: getCurrentTenant
      tags: [tenants]
      summary: Get current tenant
      description: Returns the current tenant's info for the authenticated user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No tenant found for user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current/members:
    get:
      operationId: getTenantMembers
      tags: [tenants]
      summary: List tenant members
      description: Returns all members of the current tenant
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Tenant members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantMember"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/kpi:
    get:
      operationId: getAdminKpi
      tags: [admin]
      summary: Get platform KPI metrics
      description: Returns platform-wide KPI metrics for the super-admin dashboard
      security:
        - clerkAuth: []
      responses:
        "200":
          description: KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKpi"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants:
    get:
      operationId: listAdminTenants
      tags: [admin]
      summary: List all tenants
      description: Returns all non-deleted tenants with member counts and Stripe info
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTenant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAdminTenant
      tags: [admin]
      summary: Create a new tenant
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantBody"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantCreated"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}:
    get:
      operationId: getAdminTenant
      tags: [admin]
      summary: Get tenant details
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminTenant
      tags: [admin]
      summary: Update tenant
      description: Update tenant status, plan, or other settings
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantCreated"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAdminTenant
      tags: [admin]
      summary: Soft-delete tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/stripe-sync:
    post:
      operationId: syncTenantStripe
      tags: [admin]
      summary: Create or sync Stripe customer for tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stripe customer synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSyncResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/invoices:
    get:
      operationId: getTenantInvoices
      tags: [admin]
      summary: Get tenant Stripe invoices
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/audit-logs:
    get:
      operationId: getAdminAuditLogs
      tags: [admin]
      summary: Get audit logs
      description: Returns up to 100 most recent audit log entries, optionally filtered by tenant
      security:
        - clerkAuth: []
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CurrentUser:
      type: object
      properties:
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        tenantId:
          type: ["integer", "null"]
        tenantName:
          type: ["string", "null"]
        onboardingCompleted:
          type: boolean
      required:
        - clerkId
        - email
        - onboardingCompleted

    UpdateUserBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        currency:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        fiscalYearStart:
          type: ["integer", "null"]
        industryType:
          type: ["string", "null"]
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt

    TenantMember:
      type: object
      properties:
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: string
        joinedAt:
          type: string
      required:
        - clerkId
        - email
        - role
        - joinedAt

    AdminKpi:
      type: object
      properties:
        totalTenants:
          type: integer
        activeTenants:
          type: integer
        trialTenants:
          type: integer
        suspendedTenants:
          type: integer
        stripeConnectedTenants:
          type: integer
        stripeConfigured:
          type: boolean
      required:
        - totalTenants
        - activeTenants
        - trialTenants
        - suspendedTenants
        - stripeConnectedTenants
        - stripeConfigured

    AdminTenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        currency:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        memberCount:
          type: integer
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt
        - memberCount

    AdminTenantDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tradingName:
          type: ["string", "null"]
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        legalName:
          type: ["string", "null"]
        taxId:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        addressLine1:
          type: ["string", "null"]
        addressLine2:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        postalCode:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        fiscalYearStart:
          type: ["integer", "null"]
        industryType:
          type: ["string", "null"]
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        memberCount:
          type: integer
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt
        - updatedAt
        - memberCount

    AdminTenantCreated:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        email:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - status
        - planTier

    CreateTenantBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        status:
          type: string
          enum: [active, suspended, trial, pending]
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        slug:
          type: string
      required:
        - name

    UpdateTenantBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        email:
          type: string
          format: email
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        industryType:
          type: string

    StripeSyncResult:
      type: object
      properties:
        stripeCustomerId:
          type: string
      required:
        - stripeCustomerId

    InvoiceList:
      type: object
      properties:
        stripeConfigured:
          type: boolean
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
      required:
        - stripeConfigured
        - invoices

    Invoice:
      type: object
      properties:
        id:
          type: string
        number:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        amountDue:
          type: integer
        amountPaid:
          type: integer
        currency:
          type: string
        created:
          type: string
        hostedInvoiceUrl:
          type: ["string", "null"]
      required:
        - id
        - amountDue
        - amountPaid
        - currency
        - created

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: ["integer", "null"]
        actorClerkId:
          type: ["string", "null"]
        actorEmail:
          type: ["string", "null"]
        action:
          type: string
        entityType:
          type: ["string", "null"]
        entityId:
          type: ["string", "null"]
        oldValues:
          nullable: true
        newValues:
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - action
        - createdAt
