            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseStockSummary"
        "404":
          description: Not found

  /master-data/gl-accounts:
    get:
      operationId: listGlAccounts
      tags: [master-data]
      summary: List GL accounts
      security:
        - clerkAuth: []
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 200 } }
        - { name: accountType, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string } }
        - { name: dir, in: query, schema: { type: string, enum: [asc, desc] } }
        - { name: activeOnly, in: query, schema: { type: string } }
      responses:
        "200":
          description: GL account list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlAccountListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createGlAccount
      tags: [master-data]
      summary: Create GL account
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGlAccountBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterGlAccount"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /master-data/gl-accounts/{id}:
    get:
      operationId: getGlAccount
      tags: [master-data]
      summary: Get GL account
      security:
        - clerkAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: GL account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterGlAccount"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateGlAccount
      tags: [master-data]
      summary: Update GL account
      security:
        - clerkAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGlAccountBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterGlAccount"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteGlAccount
      tags: [master-data]
      summary: Soft-delete GL account
      security:
        - clerkAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /master-data/gl-accounts/import-template:
    post:
      operationId: importGlAccountTemplate
      tags: [master-data]
      summary: Import GL accounts from a standard template
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GlTemplateImportBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlTemplateImportResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /master-data/audit-trail:
    get:
      operationId: getMasterDataAuditTrail
      tags: [master-data]
      summary: Get audit trail for a master data record
      security:
        - clerkAuth: []
      parameters:
        - name: entityType
          in: query
          required: true
          schema:
            type: string
            enum: [item, supplier, customer, warehouse, gl_account, item_variant, item_attribute, item_cross_reference, supplier_contact, customer_contact, warehouse_location]
        - name: entityId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit trail entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditTrailResponse"
        "400":
          description: Missing parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CurrentUser:
      type: object
      properties:
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        tenantId:
          type: ["integer", "null"]
        tenantName:
          type: ["string", "null"]
        onboardingCompleted:
          type: boolean
      required:
        - clerkId
        - email
        - onboardingCompleted

    UpdateUserBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        currency:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        fiscalYearStart:
          type: ["integer", "null"]
        industryType:
          type: ["string", "null"]
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt

    TenantMember:
      type: object
      properties:
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: string
        joinedAt:
          type: string
      required:
        - clerkId
        - email
        - role
        - joinedAt

    AdminKpi:
      type: object
      properties:
        totalTenants:
          type: integer
        activeTenants:
          type: integer
        trialTenants:
          type: integer
        suspendedTenants:
          type: integer
        stripeConnectedTenants:
          type: integer
        stripeConfigured:
          type: boolean
        estimatedMrrCents:
          type: integer
          description: Monthly recurring revenue in cents (plan-tier estimate for active/trial tenants)
        mrrIsEstimate:
          type: boolean
          description: True when MRR is a local plan-tier estimate rather than live Stripe data
      required:
        - totalTenants
        - activeTenants
        - trialTenants
        - suspendedTenants
        - stripeConnectedTenants
        - stripeConfigured
        - estimatedMrrCents
        - mrrIsEstimate

    AdminTenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        currency:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        memberCount:
          type: integer
        storageUsageMb:
          type: integer
          description: Storage used by this tenant in megabytes (estimated from data activity)
        subscriptionStatus:
          type: ["string", "null"]
          description: Stripe subscription status (active, trialing, past_due, canceled, etc.) or null if no subscription
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt
        - memberCount
        - storageUsageMb

    AdminTenantDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tradingName:
          type: ["string", "null"]
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        legalName:
          type: ["string", "null"]
        taxId:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        addressLine1:
          type: ["string", "null"]
        addressLine2:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        postalCode:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        fiscalYearStart:
          type: ["integer", "null"]
        industryType:
          type: ["string", "null"]
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        subscriptionStatus:
          type: ["string", "null"]
          description: Live Stripe subscription status (active, trialing, past_due, canceled, etc.)
        currentPeriodEnd:
          type: ["string", "null"]
          description: ISO timestamp of current billing period end from Stripe
        onboardingCompletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        memberCount:
          type: integer
      required:
        - id
        - name
        - slug
        - status
        - planTier
        - createdAt
        - updatedAt
        - memberCount

    AdminTenantCreated:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        email:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        billingSyncStatus:
          type: ["string", "null"]
          enum: [ok, skipped, failed, null]
          description: |
            On plan-tier changes only: outcome of the Stripe subscription sync.
            "ok" = subscription updated/created. "skipped" = no Stripe customer
            or no price configured. "failed" = Stripe API call threw — DB plan
            persisted but billing diverged; reconcile manually.
        billingSyncReason:
          type: ["string", "null"]
          description: Human-readable explanation when billingSyncStatus is "skipped" or "failed".
      required:
        - id
        - name
        - slug
        - status
        - planTier

    CreateTenantBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        status:
          type: string
          enum: [active, suspended, trial, pending]
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        slug:
          type: string
      required:
        - name

    UpdateTenantBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        status:
          type: string
          enum: [active, suspended, trial, pending]
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        email:
          type: string
          format: email
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        industryType:
          type: string

    AdminTenantMember:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: string
          enum:
            - super_admin
            - tenant_admin
            - purchaser
            - warehouse
            - approver
            - accountant
            - viewer
        isActive:
          type: boolean
        joinedAt:
          type: string
      required:
        - id
        - clerkId
        - email
        - role
        - isActive
        - joinedAt

    UpdateMemberBody:
      type: object
      properties:
        role:
          type: string
          enum:
            - super_admin
            - tenant_admin
            - purchaser
            - warehouse
            - approver
            - accountant
            - viewer
        isActive:
          type: boolean

    StripeSyncResult:
      type: object
      properties:
        stripeCustomerId:
          type: string
      required:
        - stripeCustomerId

    CreateSubscriptionBody:
      type: object
      properties:
        planTier:
          type: string
          enum: [starter, growth, enterprise]

    SubscriptionResult:
      type: object
      properties:
        subscriptionId:
          type: string
        status:
          type: string
        planTier:
          type: string
        currentPeriodEnd:
          type: ["string", "null"]
        created:
          type: boolean
          description: True if a new subscription was created, false if existing was updated
      required:
        - subscriptionId
        - status
        - planTier
        - created

    InvoiceList:
      type: object
      properties:
        stripeConfigured:
          type: boolean
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
      required:
        - stripeConfigured
        - invoices

    Invoice:
      type: object
      properties:
        id:
          type: string
        number:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        amountDue:
          type: integer
        amountPaid:
          type: integer
        currency:
          type: string
        created:
          type: string
        hostedInvoiceUrl:
          type: ["string", "null"]
      required:
        - id
        - amountDue
        - amountPaid
        - currency
        - created

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: ["integer", "null"]
        actorClerkId:
          type: ["string", "null"]
        actorEmail:
          type: ["string", "null"]
        action:
          type: string
        entityType:
          type: ["string", "null"]
        entityId:
          type: ["string", "null"]
        oldValues:
          nullable: true
        newValues:
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - action
        - createdAt

    OnboardingInvite:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tenant_admin, purchaser, warehouse, approver, accountant, viewer]
      required:
        - email
        - role

    OnboardingTenantInput:
      type: object
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 200
        industryType:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        invites:
          type: array
          maxItems: 25
          items:
            $ref: "#/components/schemas/OnboardingInvite"
      required:
        - companyName

    OnboardingInviteResult:
      type: object
      description: Per-invite dispatch outcome from the onboarding wizard.
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [tenant_admin, purchaser, warehouse, approver, accountant, viewer]
        delivered:
          type: boolean
          description: True if the email was successfully handed off to Clerk's invitation API.
        reason:
          type: string
          description: Failure reason when delivered is false.
        clerkInvitationId:
          type: string
          description: Clerk invitation id, if delivery succeeded.
      required:
        - email
        - role
        - delivered

    OnboardingResult:
      type: object
      properties:
        tenantId:
          type: integer
        slug:
          type: string
        name:
          type: string
        planTier:
          type: string
          enum: [starter, growth, enterprise]
        status:
          type: string
          enum: [active, suspended, trial, pending]
        role:
          type: string
        onboardingCompletedAt:
          type: string
        invitesSent:
          type: integer
          description: Number of invitations successfully dispatched via Clerk
        invitesAttempted:
          type: integer
          description: Number of invitations attempted (may differ from invitesSent on partial failure)
        invites:
          type: array
          description: Per-invite dispatch results
          items:
            $ref: "#/components/schemas/OnboardingInviteResult"
        alreadyOnboarded:
          type: boolean
          description: True when the user already had a tenant; no new tenant was created
      required:
        - tenantId
        - slug
        - name
        - planTier
        - status
        - role
        - invitesSent
        - alreadyOnboarded

    OnboardingSession:
      type: object
      properties:
        currentStep:
          type: integer
          minimum: 1
          maximum: 5
        data:
          type: object
          additionalProperties: true
        completedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - currentStep
        - data

    OnboardingSessionUpdate:
      type: object
      properties:
        currentStep:
          type: integer
          minimum: 1
          maximum: 5
        data:
          type: object
          additionalProperties: true

    ValidateTaxIdInput:
      type: object
      properties:
        taxId:
          type: string
        country:
          type: string
      required:
        - taxId

    ValidateTaxIdResult:
      type: object
      properties:
        valid:
          type: boolean
        message:
          type: string
        taxId:
          type: string
      required:
        - valid
        - message
        - taxId

    CsvUploadResult:
      type: object
      properties:
        csvType:
          type: string
          enum: [items, suppliers, customers]
        rows:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
        rowCount:
          type: integer
        errors:
          type: array
          items:
            type: string
        hasErrors:
          type: boolean
      required:
        - csvType
        - rows
        - rowCount
        - errors
        - hasErrors

    SampleDataItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        unitOfMeasure:
          type: string
        unitCost:
          type: string
        category:
          type: string
      required:
        - code
        - name

    SampleDataSupplier:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        contactName:
          type: string
        paymentTerms:
          type: string
        currency:
          type: string
      required:
        - code
        - name

    SampleDataCustomer:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        contactName:
          type: string
        creditLimit:
          type: string
        paymentTerms:
          type: string
        currency:
          type: string
      required:
        - code
        - name

    SampleDataResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SampleDataItem"
        suppliers:
          type: array
          items:
            $ref: "#/components/schemas/SampleDataSupplier"
        customers:
          type: array
          items:
            $ref: "#/components/schemas/SampleDataCustomer"
      required:
        - items
        - suppliers
        - customers

    SetupPaymentResult:
      type: object
      properties:
        clientSecret:
          type: ["string", "null"]
      required:
        - clientSecret

    WarehouseInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        code:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        isDefault:
          type: boolean
      required:
        - name

    DepartmentInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        code:
          type: string
      required:
        - name

    CompleteOnboardingStep1:
      type: object
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 200
        tradingName:
          type: string
        legalName:
          type: string
        taxId:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        website:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        fiscalYearStart:
          type: integer
          minimum: 1
          maximum: 12
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        industryType:
          type: string
      required:
        - companyName

    CompleteOnboardingInput:
      type: object
      properties:
        step1:
          $ref: "#/components/schemas/CompleteOnboardingStep1"
        step2:
          type: object
          properties:
            warehouses:
