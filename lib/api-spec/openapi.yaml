openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user management
  - name: tenants
    description: Tenant management
  - name: admin
    description: Super-admin platform operations
  - name: onboarding
    description: Self-serve tenant onboarding for new sign-ups
  - name: master-data
    description: Master data management — items, suppliers, customers, warehouses, GL accounts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      description: Returns the authenticated user's profile, tenant, and role
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCurrentUser
      tags: [auth]
      summary: Update current user profile
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current:
    get:
      operationId: getCurrentTenant
      tags: [tenants]
      summary: Get current tenant
      description: Returns the current tenant's info for the authenticated user
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No tenant found for user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current/members:
    get:
      operationId: getTenantMembers
      tags: [tenants]
      summary: List tenant members
      description: Returns all members of the current tenant
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Tenant members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantMember"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/kpi:
    get:
      operationId: getAdminKpi
      tags: [admin]
      summary: Get platform KPI metrics
      description: Returns platform-wide KPI metrics for the super-admin dashboard
      security:
        - clerkAuth: []
      responses:
        "200":
          description: KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKpi"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants:
    get:
      operationId: listAdminTenants
      tags: [admin]
      summary: List all tenants
      description: Returns all non-deleted tenants with member counts and Stripe info
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTenant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAdminTenant
      tags: [admin]
      summary: Create a new tenant
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantBody"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantCreated"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}:
    get:
      operationId: getAdminTenant
      tags: [admin]
      summary: Get tenant details
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminTenant
      tags: [admin]
      summary: Update tenant
      description: Update tenant status, plan, or other settings
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantCreated"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAdminTenant
      tags: [admin]
      summary: Soft-delete tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/stripe-sync:
    post:
      operationId: syncTenantStripe
      tags: [admin]
      summary: Create or sync Stripe customer for tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stripe customer synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSyncResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/stripe-subscription:
    post:
      operationId: createTenantSubscription
      tags: [admin]
      summary: Create or update Stripe subscription for tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionBody"
      responses:
        "200":
          description: Stripe subscription created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/invoices:
    get:
      operationId: getTenantInvoices
      tags: [admin]
      summary: Get tenant Stripe invoices
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/create-tenant:
    post:
      operationId: createOnboardingTenant
      tags: [onboarding]
      summary: Create a tenant via the self-serve onboarding wizard
      description: >
        Creates a new tenant for the authenticated user, makes them the
        tenant_admin, marks onboarding complete, and optionally records
        invitations for additional teammates. If the user already has an
        active membership, returns the existing tenant unchanged.
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingTenantInput"
      responses:
        "201":
          description: Tenant created and onboarding completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "200":
          description: User already had a tenant; returns existing one
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/session:
    get:
      operationId: getOnboardingSession
      tags: [onboarding]
      summary: Get the current user's onboarding session progress
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Session progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSession"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateOnboardingSession
      tags: [onboarding]
      summary: Save or update the current user's onboarding session progress
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingSessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSession"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/validate-abn:
    post:
      operationId: validateTaxId
      tags: [onboarding]
      summary: Validate a tax ID / ABN format
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateTaxIdInput"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateTaxIdResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/upload-csv:
    post:
      operationId: uploadOnboardingCsv
      tags: [onboarding]
      summary: Upload and parse a CSV file for master data import
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                csvType:
                  type: string
                  enum: [items, suppliers, customers]
      responses:
        "200":
          description: Parsed CSV rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvUploadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/load-sample:
    post:
      operationId: loadSampleData
      tags: [onboarding]
      summary: Load built-in sample data for master data import
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Sample data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SampleDataResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/setup-payment:
    post:
      operationId: setupPaymentIntent
      tags: [onboarding]
      summary: Create a Stripe SetupIntent for collecting payment details
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Stripe client secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupPaymentResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/complete:
    post:
      operationId: completeOnboarding
      tags: [onboarding]
      summary: Complete onboarding — creates tenant, warehouses, departments, imports master data, sends invites
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOnboardingInput"
      responses:
        "201":
          description: Onboarding complete, tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "200":
          description: User already had a tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/members:
    get:
      operationId: listAdminTenantMembers
      tags: [admin]
      summary: List members of a tenant
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tenant members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTenantMember"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tenants/{id}/members/{membershipId}:
    patch:
      operationId: updateAdminTenantMember
      tags: [admin]
      summary: Update a tenant member's role or active status
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: membershipId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberBody"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantMember"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/audit-logs:
    get:
      operationId: getAdminAuditLogs
      tags: [admin]
      summary: Get audit logs
      description: Returns up to 100 most recent audit log entries, optionally filtered by tenant
      security:
        - clerkAuth: []
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /master-data/items:
    get:
      operationId: listItems
      tags: [master-data]
      summary: List items
      security:
        - clerkAuth: []
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
        - { name: sort, in: query, schema: { type: string } }
        - { name: dir, in: query, schema: { type: string, enum: [asc, desc] } }
        - { name: category, in: query, schema: { type: string } }
        - { name: itemType, in: query, schema: { type: string } }
        - { name: activeOnly, in: query, schema: { type: string } }
      responses:
        "200":
          description: Item list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createItem
      tags: [master-data]
      summary: Create item
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /master-data/items/lookup:
    get:
      operationId: lookupItem
      tags: [master-data]
      summary: Look up an item by business key (code)
      security:
        - clerkAuth: []
      parameters:
        - { name: code, in: query, required: true, schema: { type: string }, description: Item code (business key) }
      responses:
        "200":
          description: Item found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterItemDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /master-data/items/import:
    post:
      operationId: importItems
      tags: [master-data]
      summary: Bulk import items from CSV data
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportItemsBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /master-data/items/{id}:
    get:
      operationId: getItem
      tags: [master-data]
      summary: Get item detail
      security:
        - clerkAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Item detail with variants, attributes, locations, cross-refs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterItemDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateItem
      tags: [master-data]
      summary: Update item
      security:
        - clerkAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteItem
      tags: [master-data]
      summary: Soft-delete item
      security:
        - clerkAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
