        itemType: { type: string }
        trackingType: { type: string }
        unitOfMeasure: { type: string, nullable: true }
        packSize: { type: string, nullable: true }
        barcode: { type: string, nullable: true }
        unitCost: { type: string, nullable: true }
        salesPrice: { type: string, nullable: true }
        marketPrice: { type: string, nullable: true }
        category: { type: string, nullable: true }
        imageUrl: { type: string, nullable: true }
        isActive: { type: boolean }
        hasVariants: { type: boolean }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ItemVariant:
      type: object
      properties:
        id: { type: integer }
        itemId: { type: integer }
        variantCode: { type: string }
        name: { type: string }
        sku: { type: string, nullable: true }
        barcode: { type: string, nullable: true }
        attributes: { type: object, nullable: true }
        costAdjustment: { type: string, nullable: true }
        priceAdjustment: { type: string, nullable: true }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    ItemAttribute:
      type: object
      properties:
